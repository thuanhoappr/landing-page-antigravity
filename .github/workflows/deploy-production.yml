# Deploy Production len Vercel bang token (khi Git/Deploy Hook khong tao duoc deployment moi).
#
# Cach dung (1 lan):
# 1) GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret:
#    - VERCEL_TOKEN        (Vercel -> Account -> Tokens -> Create)
#    - VERCEL_ORG_ID       (Vercel -> Team Settings -> General -> Team ID, dang team_...)
#    - VERCEL_PROJECT_ID   (Vercel -> Project pickleball-landing -> Settings -> General -> Project ID, dang prj_...)
# 2) Tab Actions -> workflow "Deploy Production (Vercel)" -> Run workflow -> Run workflow.
#
name: Deploy Production (Vercel)

on:
  workflow_dispatch:

concurrency:
  group: vercel-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel env (production)
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel build (output cho --prebuilt)
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Production
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
